services:
  mongodb:
    image: mongo:latest
    container_name: litpick-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: litpick_user
      MONGO_INITDB_ROOT_PASSWORD: litpick_pass_123
      MONGO_INITDB_DATABASE: litpick
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: litpick-backend
    environment:
      MONGODB_URL: mongodb://litpick_user:litpick_pass_123@mongodb:27017/litpick?authSource=admin
      DATABASE_NAME: litpick
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      HF_TOKEN: ${HF_TOKEN}
      DEBUG: "False"
    ports:
      - "5000:5000"
    volumes:
      - ./chroma_db:/app/chroma_db
      - ./logs:/app/logs
    depends_on:
      mongodb:
        condition: service_healthy
    command: uvicorn main:app --host 0.0.0.0 --port 5000
    restart: unless-stopped

volumes:
  mongodb_data:

networks:
  default:
    name: litpick-network
